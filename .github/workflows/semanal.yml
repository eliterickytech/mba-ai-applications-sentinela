name: Sentinela — digest semanal

# Roda toda segunda às 11h UTC (8h em Brasília) — e permite disparo manual.
on:
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar o pipeline (coleta → score → LLM → WhatsApp)
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_DESTINO: ${{ secrets.WHATSAPP_DESTINO }}
        run: python main.py

      - name: Guardar artefatos da semana
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-semanal
          path: saidas/
